services:
  app:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - '3001:3001'
    environment:
      MONGODB_URI: mongodb://mongo:27017/user_mongoBD
      PORT: 3001
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
